<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CircleSumoGame</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans+SC:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles.scss" />
    <style>
      html,
      body {
        font-weight: 900;
        font-style: normal;
        background: #08102E;
        font-family: "Alegreya Sans SC", sans-serif;
      }
      .loadfont-fix {
        position: absolute;
        opacity: 0;
        pointer-events: none;
        user-select: none;
      }
      .loader {
        width: 100px;
        --b: 12px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #338bff;
        -webkit-mask: repeating-conic-gradient(#0000 0deg, #000 1deg 70deg, #0000 71deg 90deg),
        radial-gradient(farthest-side, #0000 calc(100% - var(--b) - 1px), #000 calc(100% - var(--b)));
        -webkit-mask-composite: destination-in;
        mask-composite: intersect;
        animation: l5 1s infinite;
      }
      .loading-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #08102E;
      }
      @keyframes l5 {
        to {
          transform: rotate(0.5turn);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-wrapper">
        <div class="loader"></div>
      </div>
    </div>
    <div class="loadfont-fix">load font fix</div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
