# nx g @lagless/codegen:ecs --configPath circle-race/circle-race-simulation/src/lib/schema/ecs.yam
projectName: CircleSumo
components:
  Transform2d:
    positionX: float32
    positionY: float32
    rotation: float32
    prevPositionX: float32
    prevPositionY: float32
    prevRotation: float32
singletons:
  GameState:
    finishedAtTick: int32
playerResources:
  PlayerResource:
    id: uint8[16]
    mmr: uint32
    entity: uint32
    connected: uint8
    finishedAtTick: uint32
    score: uint32
    mmrChange: int32
inputs:
  PlayerJoined:
    playerId: uint8[16]
  PlayerLeft:
    reason: uint8
  Move:
    direction: float32
    speed: float32
filters:
  Transform2dFilter:
    include:
      - Transform2d
